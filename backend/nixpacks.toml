[phases.setup]
nixPkgs = ["nodejs_20", "python312", "python312Packages.pip"]

[phases.build]
cmds = [
  "npm install",
  "npm run build",
  "python3 -m pip install --break-system-packages trafilatura beautifulsoup4 feedparser scikit-learn nltk psycopg2-binary python-dotenv requests numpy"
]

[start]
cmd = "npx prisma db push && node dist/server.js"
